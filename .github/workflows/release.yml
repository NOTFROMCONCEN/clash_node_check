name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Read version from Cargo.toml
        id: meta
        shell: pwsh
        run: |
          $match = Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"$'
          if (-not $match) {
            throw "Failed to read version from Cargo.toml."
          }
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $cargoVersion = "${{ steps.meta.outputs.version }}"
          $expectedTag = "v$cargoVersion"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Tag ($actualTag) does not match Cargo.toml version ($expectedTag)."
          }

      - name: Resolve release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $notesPath = Join-Path $PWD "release-notes/$tag.md"

          if (-not (Test-Path $notesPath)) {
            New-Item -ItemType Directory -Path (Join-Path $PWD "dist") -Force | Out-Null
            $notesPath = Join-Path $PWD "dist/release-notes-$tag.md"
            @(
              "# $tag"
              ""
              "- Automated release generated by GitHub Actions."
              "- Repository: $repo"
            ) | Set-Content -Path $notesPath
          }

          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Build release assets
        shell: pwsh
        run: |
          .\scripts\build-release.ps1 -Version "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64
          if-no-files-found: error
          path: |
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.exe
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.zip
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.sha256.txt

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.exe
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.zip
            dist/clash-node-checker-v${{ steps.meta.outputs.version }}-windows-x86_64.sha256.txt
